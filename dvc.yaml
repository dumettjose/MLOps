stages:
  generate_data:
    cmd: python -m src.generate_data --params params.yaml
    deps:
      - src/generate_data.py
      - src/config.py
      - params.yaml
    params:
      - data.n_samples
      - data.random_state
      - data.score_noise_std
      - data.label_noise
      - data.raw_path
    outs:
      - data/raw/session_data.csv

  prepare_data:
    cmd: python -m src.prepare_data --params params.yaml
    deps:
      - src/prepare_data.py
      - src/config.py
      - data/raw/session_data.csv
      - params.yaml
    params:
      - split.test_size
      - split.random_state
      - split.stratify
      - data.raw_path
      - data.processed_train_path
      - data.processed_test_path
    outs:
      - data/processed/train.csv
      - data/processed/test.csv
