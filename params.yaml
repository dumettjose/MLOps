data:
  n_samples: 2000
  random_state: 60
  score_noise_std: 2.5
  label_noise: 0.04
  raw_path: data/raw/session_data.csv
  processed_train_path: data/processed/train.csv
  processed_test_path: data/processed/test.csv

split:
  test_size: 0.25
  random_state: 60
  stratify: true

model:
  type: random_forest
  random_state: 60
  n_estimators: 200
  max_depth: 10
  class_weight: balanced

mlflow:
  tracking_uri: sqlite:///mlflow.db
  experiment_name: engagement_level_classification